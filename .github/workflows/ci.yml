name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - name: test topology
        working-directory: topology-rust
        run: cargo test --all

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: test intelligence
        working-directory: intelligence-python
        run: |
          pip install -e ".[dev]"
          ruff check idt_intelligence
          pytest -q
      - name: offline verify
        run: python scripts/verify.py

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build + test hub
        working-directory: hub-go
        run: |
          go mod download
          go vet ./...
          go test ./...
          go build ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: build interface
        working-directory: interface-ts
        run: |
          npm install
          npm run build
